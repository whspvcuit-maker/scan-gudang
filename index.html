<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Input Master Dimensi Produk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f0f2f5; padding: 15px; font-family: sans-serif; }
    .form-container { max-width: 500px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: auto; }
    .btn-primary { background-color: #007bff; border: none; padding: 12px; }
    #reader { width: 100%; display: none; border-radius: 10px; overflow: hidden; margin-bottom: 20px; background-color: #000; }
    .input-label { font-weight: bold; color: #444; }
    .info-text { font-size: 0.8rem; color: #6c757d; font-style: italic; }
  </style>
</head>
<body>

<div class="form-container">
  <h4 class="text-center mb-4">Input Master Dimensi</h4>
  
  <div id="reader"></div>
  <div id="scanner-controls" class="text-center mb-3" style="display:none;">
    <button type="button" class="btn btn-danger btn-sm" onclick="stopScanner()">Matikan Kamera</button>
  </div>

  <form id="skuForm" onsubmit="handleFormSubmit(event)">
    <div class="mb-3">
      <label class="input-label">SKU Induk</label>
      <div class="input-group">
        <input type="text" class="form-control" id="sku" name="sku" onchange="ambilNamaOtomatis()" placeholder="Ketik atau Scan..." required>
        <button class="btn btn-dark" type="button" onclick="startScanner()">📷 Scan Langsung</button>
      </div>
      <div id="skuInfo" class="info-text mt-1"></div>
    </div>

    <div class="mb-3">
      <label class="input-label">Nama Product</label>
      <input type="text" class="form-control bg-light" id="nama" name="nama" readonly required placeholder="Otomatis memuat dari rumus...">
    </div>

    <div class="row">
      <div class="col-4 mb-3">
        <label class="input-label">P (cm)</label>
        <input type="number" step="0.1" class="form-control" id="p" name="p" required>
      </div>
      <div class="col-4 mb-3">
        <label class="input-label">L (cm)</label>
        <input type="number" step="0.1" class="form-control" id="l" name="l" required>
      </div>
      <div class="col-4 mb-3">
        <label class="input-label">T (cm)</label>
        <input type="number" step="0.1" class="form-control" id="t" name="t" required>
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100" id="submitBtn">Simpan Ke Sheet</button>
  </form>
  
  <div id="output" class="mt-3 text-center small fw-bold"></div>
</div>

<script>
  let html5QrCode;
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-KaFlkWarnQo0AgFtOSx0c55oRtJyn1fG50fZIa253cS-CNgAKHY8l8xh91MJ7zQu7g/exec"; 

  function ambilNamaOtomatis() {
    const val = document.getElementById('sku').value.trim();
    if(!val) return;
    document.getElementById('nama').value = "Menghubungkan Rumus Sheet...";
    
    fetch(`${WEB_APP_URL}?action=cari&sku=${encodeURIComponent(val)}`)
      .then(res => res.text())
      .then(hasil => { document.getElementById('nama').value = hasil; })
      .catch(err => { document.getElementById('nama').value = "Gagal memuat nama produk"; });
  }

  function startScanner() {
    document.getElementById('reader').style.display = 'block';
    document.getElementById('scanner-controls').style.display = 'block';
    
    html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 15, qrbox: { width: 250, height: 150 } };
    
    html5QrCode.start(
      { facingMode: "environment" }, config,
      (decodedText) => {
        let skuAsli = decodedText.trim();
        let skuInduk = skuAsli.slice(0, -1);
        
        document.getElementById('sku').value = skuInduk;
        document.getElementById('skuInfo').innerText = "Scan: " + skuAsli + " ➔ Induk: " + skuInduk;
        
        stopScanner();
        ambilNamaOtomatis();
        if (navigator.vibrate) navigator.vibrate(100);
      },
      (errorMessage) => {}
    ).catch((err) => {
      alert("Kamera gagal diakses: " + err);
      stopScanner();
    });
  }

  function stopScanner() {
    if (html5QrCode && html5QrCode.isScanning) {
      html5QrCode.stop().then(() => {
        document.getElementById('reader').style.display = 'none';
        document.getElementById('scanner-controls').style.display = 'none';
      });
    } else {
      document.getElementById('reader').style.display = 'none';
      document.getElementById('scanner-controls').style.display = 'none';
    }
  }

  function handleFormSubmit(event) {
    event.preventDefault();
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('output').innerText = "Menyimpan...";
    
    const formData = new URLSearchParams();
    formData.append('sku', document.getElementById('sku').value);
    formData.append('nama', document.getElementById('nama').value);
    formData.append('p', document.getElementById('p').value);
    formData.append('l', document.getElementById('l').value);
    formData.append('t', document.getElementById('t').value);

    fetch(WEB_APP_URL, {
      method: 'POST',
      body: formData,
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
    })
    .then(res => res.text())
    .then(msg => {
      alert(msg);
      document.getElementById('skuForm').reset();
      document.getElementById('skuInfo').innerText = "";
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('output').innerText = "";
    })
    .catch(err => {
      alert("Gagal menyimpan data.");
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('output').innerText = "";
    });
  }
</script>
</body>
</html>
