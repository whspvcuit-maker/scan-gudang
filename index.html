<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Scan Dimensi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f8f9fa; padding: 15px; }
    .form-container { max-width: 500px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
    #reader { width: 100%; display: none; border-radius: 10px; margin-bottom: 15px; }
  </style>
</head>
<body>
<div class="form-container">
  <h5 class="text-center mb-4">Input Dimensi Produk</h5>
  <div id="reader"></div>
  <form id="skuForm" onsubmit="handleFormSubmit(event)">
    <div class="mb-3">
      <label class="fw-bold">SKU Hasil Scan</label>
      <div class="input-group">
        <input type="text" class="form-control" id="sku" placeholder="Scan atau ketik..." required>
        <button class="btn btn-dark" type="button" onclick="startScanner()">📷 Scan</button>
      </div>
    </div>
    <div class="mb-3">
      <label class="fw-bold">Nama Product (VLOOKUP ITO)</label>
      <input type="text" class="form-control bg-light" id="nama" readonly placeholder="Mencari di database...">
    </div>
    <div class="row">
      <div class="col-4"><label>P (cm)</label><input type="number" step="0.1" class="form-control" id="p" required></div>
      <div class="col-4"><label>L (cm)</label><input type="number" step="0.1" class="form-control" id="l" required></div>
      <div class="col-4"><label>T (cm)</label><input type="number" step="0.1" class="form-control" id="t" required></div>
    </div>
    <button type="submit" class="btn btn-primary w-100 mt-4" id="submitBtn">Simpan Ke Sheet</button>
  </form>
</div>

<script>
  // GANTI LINK DI BAWAH DENGAN URL EXEC BARU ANDA
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-KaFlkWarnQo0AgFtOSx0c55oRtJyn1fG50fZIa253cS-CNgAKHY8l8xh91MJ7zQu7g/exec"; 

  function ambilNamaOtomatis() {
    const sku = document.getElementById('sku').value;
    document.getElementById('nama').value = "Mencari...";
    fetch(`${WEB_APP_URL}?action=cari&sku=${encodeURIComponent(sku)}`)
      .then(r => r.text())
      .then(t => { document.getElementById('nama').value = t; });
  }

  function startScanner() {
    document.getElementById('reader').style.display = 'block';
    const scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
      (txt) => {
        document.getElementById('sku').value = txt.trim(); // SKU UTUH
        scanner.stop();
        document.getElementById('reader').style.display = 'none';
        ambilNamaOtomatis();
      }
    ).catch(e => alert("Kamera Error: " + e));
  }

  function handleFormSubmit(e) {
    e.preventDefault();
    document.getElementById('submitBtn').disabled = true;
    const params = new URLSearchParams({
      sku: document.getElementById('sku').value,
      nama: document.getElementById('nama').value,
      p: document.getElementById('p').value,
      l: document.getElementById('l').value,
      t: document.getElementById('t').value
    });
    fetch(WEB_APP_URL, { method: 'POST', body: params })
      .then(r => r.text())
      .then(m => { alert(m); location.reload(); });
  }
</script>
</body>
</html>
