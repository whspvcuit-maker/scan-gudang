<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Scan Dimensi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f8f9fa; padding: 15px; }
    .form-container { max-width: 500px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
    #reader { width: 100%; display: none; border-radius: 10px; margin-bottom: 15px; }
  </style>
</head>
<body>
<div class="form-container">
  <h5 class="text-center mb-4">Input Dimensi Produk</h5>
  <div id="reader"></div>
  <form id="skuForm" onsubmit="handleFormSubmit(event)">
    <div class="mb-3">
      <label class="fw-bold">SKU Hasil Scan</label>
      <div class="input-group">
        <input type="text" class="form-control" id="sku" placeholder="Scan atau ketik..." onchange="ambilNamaOtomatis()" onkeyup="debouncedAmbilNama()" required>
        <button class="btn btn-dark" type="button" onclick="startScanner()">📷 Scan</button>
      </div>
    </div>
    <div class="mb-3">
      <label class="fw-bold">Nama Product (VLOOKUP ITO)</label>
      <input type="text" class="form-control bg-light" id="nama" readonly placeholder="Mencari di database...">
    </div>
    <div class="row">
      <div class="col-4"><label>P (cm)</label><input type="number" step="0.1" class="form-control" id="p" required></div>
      <div class="col-4"><label>L (cm)</label><input type="number" step="0.1" class="form-control" id="l" required></div>
      <div class="col-4"><label>T (cm)</label><input type="number" step="0.1" class="form-control" id="t" required></div>
    </div>
    <button type="submit" class="btn btn-primary w-100 mt-4" id="submitBtn">Simpan Ke Sheet</button>
  </form>
</div>

<script>
  // Link Web App Apps Script Anda yang aktif
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxsWGuaIwcJJLRy5hlG0VvqGSunnT_vBiDm4Y0RfgAxn4lejCG9-NIImMB8Go17suDkdQ/exec"; 

  let timeoutKetik = null;

  function debouncedAmbilNama() {
    clearTimeout(timeoutKetik);
    timeoutKetik = setTimeout(ambilNamaOtomatis, 800); 
  }

  // JALUR BYPASS CORS MENGGUNAKAN METODE JSONP (SCRIPT INJECTION)
  function ambilNamaOtomatis() {
    const sku = document.getElementById('sku').value.trim();
    if (!sku) return;
    
    document.getElementById('nama').value = "Mencari...";

    // Hapus script pemicu request JSONP lama jika masih menempel di halaman
    const scriptId = 'jsonp_sku_request';
    const scriptLama = document.getElementById(scriptId);
    if (scriptLama) scriptLama.remove();

    // Buat tag <script> baru untuk memanggil API secara aman bypass CORS
    const script = document.createElement('script');
    script.id = scriptId;
    script.src = `${WEB_APP_URL}?action=cari&sku=${encodeURIComponent(sku)}&callback=tampilkanNamaKeForm`;
    
    // Masukkan ke body dokumen agar tereksekusi oleh browser
    document.body.appendChild(script);
  }

  // Fungsi penangkap data sukses yang dikirim balik oleh Google Apps Script
  function tampilkanNamaKeForm(namaProduk) {
    document.getElementById('nama').value = namaProduk;
  }

  function startScanner() {
    document.getElementById('reader').style.display = 'block';
    const scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
      (txt) => {
        document.getElementById('sku').value = txt.trim(); 
        scanner.stop();
        document.getElementById('reader').style.display = 'none';
        ambilNamaOtomatis();
      }
    ).catch(e => alert("Kamera Error: " + e));
  }

  function handleFormSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = "Menyimpan...";

    const payload = {
      sku: document.getElementById('sku').value,
      nama: document.getElementById('nama').value,
      p: document.getElementById('p').value,
      l: document.getElementById('l').value,
      t: document.getElementById('t').value
    };

    fetch(WEB_APP_URL, { 
      method: 'POST', 
      mode: 'no-cors', 
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload) 
    })
    .then(() => {
      alert("Data dimensi berhasil dikirim ke Google Sheets!");
      document.getElementById('sku').value = "";
      document.getElementById('nama').value = "";
      document.getElementById('p').value = "";
      document.getElementById('l').value = "";
      document.getElementById('t').value = "";
      btn.disabled = false;
      btn.innerText = "Simpan Ke Sheet";
    })
    .catch(err => {
      alert("Terjadi masalah saat mengirim data: " + err);
      btn.disabled = false;
      btn.innerText = "Simpan Ke Sheet";
    });
  }
</script>
</body>
</html>
